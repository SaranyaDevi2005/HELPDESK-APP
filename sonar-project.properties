# SonarQube / SonarCloud project config
sonar.projectKey=helpdesk-devops
sonar.projectName=HelpDesk DevOps
sonar.projectVersion=1.0

# Source paths
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/tests/**,**/*.test.*

# Python settings
sonar.python.version=3.9

# Test coverage
sonar.python.coverage.reportPaths=coverage.xml

# Language
sonar.language=py
