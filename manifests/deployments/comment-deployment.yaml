apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
      - name: comment
        image: comment-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: helpdesk-secrets
              key: mongo-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: helpdesk-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 15
