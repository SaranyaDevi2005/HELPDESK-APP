apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: helpdesk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_AUTH_API
          value: "http://auth-service:8001"
        - name: REACT_APP_TICKET_API
          value: "http://ticket-service:8002"
        - name: REACT_APP_COMMENT_API
          value: "http://comment-service:8003"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
